<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таро Ворожіння</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a0f2e 0%, #0a0514 100%);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
            text-align: center;
        }
        .hint {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 500px;
            margin-bottom: 40px;
        }
        .card {
            width: 90px;
            height: 150px;
            background: linear-gradient(135deg, #3a1c5c 0%, #1f0d33 100%);
            border: 2px solid #d4af37;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Ефект сорочки карти */
        .card::before {
            content: "🔮";
            font-size: 30px;
            opacity: 0.7;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3);
            border-color: #fff;
        }
        .card.selected {
            border-color: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            transform: translateY(-15px) scale(1.05);
        }
        .btn {
            background: linear-gradient(90deg, #d4af37 0%, #aa8513 100%);
            color: #0a0514;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            display: none; /* Показуємо тільки коли карти обрано */
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>

    <h2>Оберіть карти долі</h2>
    <div class="hint">Доторкніться до 3-х карт, щоб зазирнути у майбутнє</div>

    <div class="cards-container">
        <div class="card" onclick="selectCard(this, 1)"></div>
        <div class="card" onclick="selectCard(this, 2)"></div>
        <div class="card" onclick="selectCard(this, 3)"></div>
        <div class="card" onclick="selectCard(this, 4)"></div>
        <div class="card" onclick="selectCard(this, 5)"></div>
        <div class="card" onclick="selectCard(this, 6)"></div>
        <div class="card" onclick="selectCard(this, 7)"></div>
        <div class="card" onclick="selectCard(this, 8)"></div>
        <div class="card" onclick="selectCard(this, 9)"></div>
    </div>

    <button class="btn" id="sendBtn" onclick="sendResult()">Дізнатися передбачення</button>

    <script>
        // Ініціалізація Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо вікно на максимум

        // Масив усіх карт Старших Арканів для випадкового вибору
        const tarotDeck = [
            "Дурень", "Маг", "Верховна Жриця", "Імператриця", "Імператор", 
            "Ієрофант", "Закохані", "Колісниця", "Сила", "Відшельник", 
            "Колесо Фортуни", "Справедливість", "Повішений", "Смерть", 
            "Помірність", "Диявол", "Вежа", "Зірка", "Місяць", "Сонце", 
            "Суд", "Світ"
        ];

        let selectedCards = [];

        function selectCard(element, id) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedCards = selectedCards.filter(item => item !== id);
            } else {
                if (selectedCards.length >= 3) return; // Максимум 3 карти
                element.classList.add('selected');
                selectedCards.push(id);
            }

            // Показуємо кнопку, якщо обрано рівно 3 карти
            const btn = document.getElementById('sendBtn');
            if (selectedCards.length === 3) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        function sendResult() {
            // Перемішуємо колоду і дістаємо 3 випадкові карти
            const shuffled = tarotDeck.sort(() => 0.5 - Math.random());
            const result = [shuffled[0], shuffled[1], shuffled[2]];

            // Передаємо результат назад боту у вигляді JSON-рядка
            tg.sendData(JSON.stringify({cards: result}));
            tg.close(); // Закриваємо Web App вікно
        }
    </script>
</body>
</html>
